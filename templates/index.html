<!DOCTYPE html>
<html>
<head>
    <title>AI Detector</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e2e8f0;
        }

        .container {
            width: 520px;
            backdrop-filter: blur(15px);
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #0f172a;
            color: #fff;
            resize: none;
            font-size: 14px;
        }

        textarea:focus {
            outline: none;
            border-color: #818cf8;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        #result {
            margin-top: 20px;
        }

        .card {
            padding: 18px;
            border-radius: 12px;
            background: #0f172a;
            border: 1px solid #334155;
        }

        .ai {
            color: #f87171;
        }

        .human {
            color: #34d399;
        }

        .bar {
            margin-top: 12px;
        }

        .bar-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .progress {
            height: 8px;
            background: #334155;
            border-radius: 6px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease;
        }

        .ai-fill {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        .human-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        /* Spinner */
        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

<div class="container">
    <h2>AI vs Human Detector</h2>

    <textarea id="text" placeholder="Paste your text here..."></textarea>

    <button onclick="check()">Analyze</button>

    <div id="result"></div>
</div>

<script>
async function check() {
    let text = document.getElementById("text").value;

    if (!text.trim()) {
        document.getElementById("result").innerHTML =
            "<p style='color:#f87171;'>Enter text first</p>";
        return;
    }

    document.getElementById("result").innerHTML =
        "<div class='spinner'></div>";

    let res = await fetch("/detect", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
    });

    let data = await res.json();

    let aiScore = 0;
    let humanScore = 0;

    data.predictions.forEach(p => {
        if (p.label === "AI-generated") aiScore = p.score;
        if (p.label === "Human-written") humanScore = p.score;
    });

    let verdictClass = data.final_verdict === "AI-generated" ? "ai" : "human";

    document.getElementById("result").innerHTML = `
        <div class="card">
            <h3 class="${verdictClass}">
                Final Verdict: ${data.final_verdict}
            </h3>

            <div class="bar">
                <div class="bar-header">
                    <span>AI-generated</span>
                    <span>${aiScore}%</span>
                </div>
                <div class="progress">
                    <div class="fill ai-fill" id="aiBar"></div>
                </div>
            </div>

            <div class="bar">
                <div class="bar-header">
                    <span>Human-written</span>
                    <span>${humanScore}%</span>
                </div>
                <div class="progress">
                    <div class="fill human-fill" id="humanBar"></div>
                </div>
            </div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("aiBar").style.width = aiScore + "%";
        document.getElementById("humanBar").style.width = humanScore + "%";
    }, 100);
}
</script>

</body>
</html>
